name: GrimmLink CI

on:
  pull_request:
  push:
    branches:
      - main
      - feature/grimmlink-adaptation

jobs:
  plugin-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Lua 5.1
        uses: leafo/gh-actions-lua@v13
        with:
          luaVersion: "5.1"

      - name: Setup LuaRocks
        uses: leafo/gh-actions-luarocks@v6

      - name: Install test dependencies
        run: |
          luarocks install lua-term 0.7-1 || true
          luarocks install busted
          luarocks install luacov
          luarocks install luacov-cobertura

      - name: Syntax check GrimmLink Lua files
        run: |
          LUA_COMPILER="$(command -v luac5.1 || command -v luac)"
          if [ -z "$LUA_COMPILER" ]; then
            echo "luac was not found"
            exit 1
          fi
          find grimmlink.koplugin -type f -name '*.lua' -print0 | xargs -0 -n1 "$LUA_COMPILER" -p

      - name: Run GrimmLink plugin tests
        run: |
          chmod +x ./run_tests.sh
          ./run_tests.sh

      - name: Guard updater repo and upstream references
        run: |
          if git grep -n "WorldTeacher/BookLoreSync-plugin" -- grimmlink.koplugin; then
            echo "Forbidden updater reference found in active GrimmLink code"
            exit 1
          fi
          grep -n 'GITHUB_REPO = "0xstillb/grimmlink"' grimmlink.koplugin/grimmlink_updater.lua >/dev/null

      - name: Guard forbidden legacy endpoints
        run: |
          if git grep -nE '/api/v1/books/personal-rating|/api/v1/annotations|/api/v2/book-notes|/api/v1/book-notes|/api/v1/bookmarks' -- grimmlink.koplugin '*.lua'; then
            echo "Forbidden legacy endpoint usage found in GrimmLink plugin code"
            exit 1
          fi

      - name: Guard accidental BookLoreSync naming
        run: |
          if git grep -nE 'BookLoreSync|bookloresync|BookloreSync' -- grimmlink.koplugin '*.lua'; then
            echo "Legacy BookLoreSync naming found in plugin code"
            exit 1
          fi

      - name: Guard risky secret logging patterns
        run: |
          if git grep -nE 'logger\.(dbg|info|warn|err).*(password|x-auth-key|Authorization|token|payload_json|highlight|note)' -- grimmlink.koplugin '*.lua'; then
            echo "Potential secret logging found"
            exit 1
          fi

      - name: Verify plugin folder structure
        run: |
          test -d grimmlink.koplugin
          test -f grimmlink.koplugin/main.lua
          test -f grimmlink.koplugin/_meta.lua
          test -f grimmlink.koplugin/plugin_version.lua

      - name: Validate plugin ZIP packaging
        run: |
          zip -r grimmlink.koplugin.zip grimmlink.koplugin/
          test -f grimmlink.koplugin.zip

      - name: Guard accidental packaging artifacts
        run: |
          if git ls-files | grep -E '(^|/)grimmlink\.koplugin\.zip$|(^|/)grimmlink-v[0-9].*\.zip$'; then
            echo "Release ZIP artifacts must not be committed"
            exit 1
          fi
