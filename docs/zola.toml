# The URL the site will be built for
base_url = "https://github.com/0xstillb/grimmlink"
title = "Legacy GrimmLink Reference"
description = "Historical upstream KOReader plugin documentation retained for reference during the GrimmLink MVP transition."
theme = "tanuki"
# Whether to automatically compile all Sass files in the sass directory
compile_sass = true

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = true

[markdown]
insert_anchor_links = "left"

[extra]
mode = "docs"
gitlab = "https://github.com/0xstillb/grimmlink"
show_theme_toggle = true

